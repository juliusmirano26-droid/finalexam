<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Exam - Project Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 28px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Aking Final Exam Website</h1>
        <div class="status-badge">Live sa Cloud Server</div>
        
        <p>Maligayang pagdating! Ang website na ito ay matagumpay na nadeploy gamit ang Apache Web Server, naka-sync sa GitHub, at handa nang ikonekta sa Firebase.</p>
        
        <a href="#" class="btn">Magsimula Rito</a>
        
        <footer>
            Handog ni Julius Mirano &copy; 2026
        </footer>
    </div>

</body>
</html>
